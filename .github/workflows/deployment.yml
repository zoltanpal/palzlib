on:
  workflow_dispatch:
    inputs:
      selected_modules:
        description: "Modules to deploy (comma separated: sentiment_analyzer,palzlib_db)"
        required: true
        default: "sentiment_analyzer,palzlib_db"

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [sentiment_analyzer, palzlib_db]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build backend
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Check if selected
        id: check
        run: |
          if echo "${{ github.event.inputs.selected_modules }}" | grep -qw "${{ matrix.module }}"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.deploy == 'true'
        run: |
          cd ${{ matrix.module }}
          python -m build

      - name: Deploy
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "${{ matrix.module }}/dist/*"
          target: "/var/www/libs/"
