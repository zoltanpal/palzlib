name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      option1:
        type: boolean
      option2:
        type: boolean
      option3:
        type: boolean
      modules:
        description: "Modules to deploy (comma separated: sentiment_analyzer,palzlib_db)"
        required: true
        default: "sentiment_analyzer,palzlib_db"

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [sentiment_analyzer, palzlib_db]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build backend
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Check if module is selected
        id: check
        run: |
          if echo "${{ github.event.inputs.modules }}" | grep -qw "${{ matrix.module }}"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Build module
        if: steps.check.outputs.deploy == 'true'
        run: |
          ls -la
          cd ${{ matrix.module }}
          ls -la
          python -m build

      - name: Deploy module
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "${{ matrix.module }}/dist/*"
          target: "/var/www/libs/"

      - name: Verify Deployment
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ls -lh "/var/www/libs/${{ matrix.module }}"
            echo "Deployed ${{ matrix.module }} successfully!"
